name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Allows manual trigger from the Actions tab
  workflow_dispatch:

# Grant the GITHUB_TOKEN permissions to deploy to Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; don't cancel in-progress runs
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Formspree endpoint — add this as a secret in your repo settings:
          # Settings → Secrets and variables → Actions → New repository secret
          # Name: NEXT_PUBLIC_FORMSPREE_ENDPOINT  Value: your_formspree_id
          NEXT_PUBLIC_FORMSPREE_ENDPOINT: ${{ secrets.NEXT_PUBLIC_FORMSPREE_ENDPOINT }}

          # Only set NEXT_PUBLIC_BASE_PATH if deploying to a repo page
          # (e.g. jp-bothma.github.io/my-site → set to /my-site)
          # Leave unset (or empty) when using a custom domain or user page
          # NEXT_PUBLIC_BASE_PATH: /my-site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
